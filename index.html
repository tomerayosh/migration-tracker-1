<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Migration Tracker</title>
<!-- Supabase library: lets the page talk to our cloud database -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* ---------- sea palette ---------- */
  :root{
    --bg:#eef5f8; --card:#ffffff; --ink:#0d3344; --muted:#6a8a99;
    --line:#e3eef3; --sea:#1f9bb3; --sea-deep:#147a8e; --sea-soft:#e6f4f7;
    --soon:#d98a2b; --over:#d65a54; --done:#2e9e7a;
    --shadow:0 1px 2px rgba(13,51,68,.06), 0 6px 18px rgba(13,51,68,.05);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter',-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    background:var(--bg);color:var(--ink);font-size:15px;-webkit-font-smoothing:antialiased}

  /* ---------- top bar ---------- */
  header{background:linear-gradient(135deg,#23a6bf,#147a8e);color:#fff;
    padding:20px 16px 18px;position:sticky;top:0;z-index:10;
    box-shadow:0 4px 16px rgba(20,122,142,.25)}
  .bar{max-width:600px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
  header h1{margin:0;font-size:19px;font-weight:700;letter-spacing:.2px}
  header .sub{margin:2px 0 0;font-size:12px;opacity:.85}
  .stats{display:flex;gap:14px;font-size:12px}
  .stats b{display:block;font-size:17px;font-weight:700}
  .stats span{opacity:.85}

  .wrap{max-width:600px;margin:0 auto;padding:16px}

  /* ---------- tabs ---------- */
  .tabs{display:flex;gap:6px;margin-bottom:16px}
  .tab{flex:1;text-align:center;padding:10px;border-radius:11px;background:var(--card);
    border:1px solid var(--line);color:var(--muted);font-size:14px;font-weight:600;box-shadow:var(--shadow)}
  .tab.active{background:var(--sea);color:#fff;border-color:var(--sea)}
  .tab.soon{opacity:.45;font-weight:500}

  /* ---------- quick add ---------- */
  .qadd{background:var(--card);border:1px solid var(--line);border-radius:13px;
    box-shadow:var(--shadow);margin-bottom:18px;overflow:hidden}
  .qadd > .open-btn{display:flex;align-items:center;gap:10px;padding:13px 15px;
    cursor:pointer;color:var(--muted);font-size:14.5px}
  .qadd > .open-btn .plus{width:22px;height:22px;border-radius:50%;background:var(--sea);
    color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;flex:0 0 auto}
  .composer{display:none;padding:4px 15px 15px}
  .qadd.open .open-btn{display:none}
  .qadd.open .composer{display:block}
  .composer input,.composer select,.composer textarea{font-size:14.5px;padding:10px;
    border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);width:100%;font-family:inherit}
  .composer .title-in{font-size:16px;font-weight:600;border:none;padding:8px 2px}
  .composer .title-in:focus{outline:none}
  .composer textarea{resize:vertical;min-height:46px}
  .row{display:flex;gap:8px;margin-bottom:8px}
  .row > *{flex:1}
  .lbl{font-size:11.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
  .actions{display:flex;gap:8px;margin-top:6px}
  .btn{border:none;border-radius:9px;padding:11px 16px;font-size:14.5px;font-weight:600;cursor:pointer}
  .btn.primary{background:var(--sea);color:#fff;flex:1}
  .btn.ghost{background:var(--sea-soft);color:var(--sea-deep)}

  /* ---------- filter ---------- */
  .filter{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .filter select{font-size:13.5px;padding:8px 10px;border:1px solid var(--line);
    border-radius:9px;background:#fff;color:var(--ink)}
  .filter .ft-lbl{font-size:12px;color:var(--muted);font-weight:600}

  /* ---------- section headers ---------- */
  .sect{display:flex;align-items:center;gap:8px;margin:20px 4px 9px}
  .sect h2{margin:0;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.6px}
  .sect .count{font-size:11.5px;color:var(--muted);background:var(--card);
    border:1px solid var(--line);border-radius:20px;padding:1px 9px;font-weight:600}
  .sect.overdue h2{color:var(--over)} .sect.today h2{color:var(--sea-deep)}

  /* ---------- task card ---------- */
  .card{background:var(--card);border:1px solid var(--line);border-radius:13px;
    padding:13px 15px;margin-bottom:9px;box-shadow:var(--shadow);
    transition:box-shadow .15s,transform .15s}
  .card:hover{box-shadow:0 2px 4px rgba(13,51,68,.08),0 10px 26px rgba(13,51,68,.08)}
  .task{display:flex;gap:12px}
  .check{width:21px;height:21px;border-radius:50%;border:2px solid var(--line);
    flex:0 0 auto;margin-top:1px;cursor:pointer;display:flex;align-items:center;
    justify-content:center;color:#fff;font-size:13px;transition:.15s}
  .check:hover{border-color:var(--sea)}
  .check.on{background:var(--done);border-color:var(--done)}
  .body{flex:1;min-width:0}
  .titlewrap{display:flex;flex-wrap:wrap;align-items:center;gap:8px}
  .title{font-weight:600;font-size:15px}
  .title.done{text-decoration:line-through;color:var(--muted);font-weight:500}
  .del{background:none;border:none;color:#b9cdd6;font-size:16px;cursor:pointer;padding:0 0 0 6px}
  .del:hover{color:var(--over)}
  .due{font-size:12.5px;color:var(--muted);margin-top:3px}
  .due.over{color:var(--over);font-weight:600} .due.soon{color:var(--soon);font-weight:600}
  .meta{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-top:8px}
  .status{font-size:12px;padding:3px 9px;border-radius:20px;border:1px solid var(--line);
    background:#fff;color:var(--ink);font-weight:500}
  .chip{font-size:11.5px;padding:2px 9px;border-radius:20px;font-weight:600}
  .cost{font-size:12.5px;color:var(--sea-deep);background:var(--sea-soft);
    padding:2px 9px;border-radius:20px;font-weight:600}

  .more{margin-top:9px;border-top:1px solid var(--line);padding-top:7px}
  .more summary{cursor:pointer;font-size:12.5px;color:var(--muted);font-weight:600;
    list-style:none;padding:2px 0}
  .more summary::-webkit-details-marker{display:none}
  .more textarea{font-size:14px;padding:9px;border:1px solid var(--line);border-radius:9px;
    width:100%;font-family:inherit;resize:vertical;min-height:44px;color:var(--ink)}
  .sub{display:flex;align-items:center;gap:9px;margin:6px 0;font-size:14px}
  .sub input[type=checkbox]{width:16px;height:16px;accent-color:var(--done)}
  .sub .stxt.done{text-decoration:line-through;opacity:.5}
  .sub .sdate{font-size:11.5px;color:var(--muted)}
  .sub .sdate.over{color:var(--over);font-weight:600}
  .sub .x{margin-left:auto;color:#b9cdd6;cursor:pointer}
  .subadd input[type=date]{flex:0 0 132px}
  .cal{font-size:11.5px;color:var(--sea-deep);text-decoration:none;white-space:nowrap;font-weight:600}
  .cal:hover{text-decoration:underline}
  .subadd{display:flex;gap:6px;margin-top:7px}
  .subadd input{flex:1;font-size:14px;padding:8px;border:1px solid var(--line);border-radius:8px;font-family:inherit}
  .subadd button{flex:0 0 auto;background:var(--sea);color:#fff;border:none;border-radius:8px;padding:0 13px;font-size:17px;cursor:pointer}

  .completed-wrap summary{cursor:pointer;color:var(--muted);font-weight:700;font-size:13px;
    text-transform:uppercase;letter-spacing:.6px;list-style:none;margin:22px 4px 6px}
  .completed-wrap summary::-webkit-details-marker{display:none}
  .completed-wrap .card{opacity:.62}
  .empty{color:var(--muted);font-size:14px;text-align:center;padding:28px 0}

  /* ---------- login ---------- */
  #login{display:none;min-height:100vh;align-items:center;justify-content:center;padding:24px;
    background:linear-gradient(160deg,#23a6bf,#147a8e)}
  .login-card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);
    padding:30px 24px;width:100%;max-width:340px;text-align:center}
  .login-card h1{margin:0;font-size:22px;color:var(--sea-deep)}
  .login-sub{margin:4px 0 22px;font-size:13px;color:var(--muted)}
  .login-card input{width:100%;font-size:15px;padding:12px;margin-bottom:10px;
    border:1px solid var(--line);border-radius:10px;font-family:inherit;background:#fff;color:var(--ink)}
  .login-card .btn.primary{width:100%;margin-top:4px}
  .login-err{color:var(--over);font-size:13px;margin:12px 0 0;min-height:16px}
  .logout{background:rgba(255,255,255,.18);color:#fff;border:none;border-radius:8px;
    padding:6px 11px;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap}
  .logout:hover{background:rgba(255,255,255,.28)}
</style>
</head>
<body>

<!-- login screen — shown until you're signed in -->
<div id="login">
  <div class="login-card">
    <h1>Migration Tracker</h1>
    <p class="login-sub">Israel → Australia</p>
    <input id="l-email" type="email" placeholder="Email" autocomplete="username">
    <input id="l-pass" type="password" placeholder="Password" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')signIn()">
    <button class="btn primary" onclick="signIn()">Log in</button>
    <p id="l-err" class="login-err"></p>
  </div>
</div>

<!-- the app itself — hidden until you're signed in -->
<div id="app" style="display:none">
<header>
  <div class="bar">
    <div>
      <h1>Migration Tracker</h1>
      <p class="sub">Israel → Australia</p>
    </div>
    <div style="display:flex;align-items:center;gap:14px">
      <div class="stats" id="stats"></div>
      <button class="logout" onclick="signOut()" title="Log out">Log out</button>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="tabs">
    <div class="tab active">Tasks</div>
    <div class="tab soon">Money</div>
    <div class="tab soon">Notes</div>
  </div>

  <!-- quick add -->
  <div class="qadd" id="qadd">
    <div class="open-btn" onclick="openComposer()">
      <span class="plus">+</span> Add a task…
    </div>
    <div class="composer">
      <input class="title-in" id="t-title" placeholder="What needs doing?">
      <div class="row" style="margin-top:6px">
        <label style="flex:1"><span class="lbl">Due date</span><input id="t-due" type="date"></label>
        <label style="flex:1"><span class="lbl">Status</span>
          <select id="t-status"><option>Needed</option><option>Submitted</option><option>Approved</option></select>
        </label>
      </div>
      <div class="row">
        <label style="flex:2"><span class="lbl">Cost (optional)</span><input id="t-cost" type="number" min="0" placeholder="0"></label>
        <label style="flex:1"><span class="lbl">Currency</span>
          <select id="t-cur"><option value="₪">₪</option><option value="A$">A$</option></select>
        </label>
      </div>
      <label><span class="lbl">Tags</span><input id="t-tags" placeholder="visa, school (comma-separated)"></label>
      <label style="display:block;margin-top:8px"><span class="lbl">Notes</span>
        <textarea id="t-notes" placeholder="Links, names, anything…"></textarea></label>
      <label style="display:block;margin-top:8px"><span class="lbl">Sub-tasks (optional)</span></label>
      <div id="new-subs"></div>
      <div class="subadd">
        <input id="ns-text" placeholder="Add a sub-task" onkeydown="if(event.key==='Enter'){event.preventDefault();addNewSub()}">
        <input id="ns-date" type="date" title="Optional due date">
        <button type="button" onclick="addNewSub()">+</button>
      </div>
      <div class="actions">
        <button class="btn primary" onclick="addTask()">Add task</button>
        <button class="btn ghost" onclick="closeComposer()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- filter -->
  <div class="filter">
    <span class="ft-lbl">Filter</span>
    <select id="f-tag" onchange="render()"><option value="all">All tags</option></select>
  </div>

  <div id="list"></div>
</div>
</div><!-- /#app -->

<script>
// ---------- Cloud sync (Supabase) ----------
const SB_URL = "https://qtuvwakyqppfepovzjux.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0dXZ3YWt5cXBwZmVwb3Z6anV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NTc4NzgsImV4cCI6MjA5ODIzMzg3OH0.P2jtPIKacYprsOEAlfM9Y14boKvFSIxeLzVb_JKezEQ"; // anon/public key — safe in front-end code
const sb = supabase.createClient(SB_URL, SB_KEY);

let tasks = [];

// Load every task from the cloud, then draw the screen.
async function load(){
  const { data, error } = await sb.from("tasks").select("id, data");
  if(error){ alert("Couldn't load from the cloud: " + error.message); return; }
  tasks = data.map(r => r.data);
  tasks.forEach(t => { if(!t.subs) t.subs = []; if(t.notes===undefined) t.notes = ""; });
  render();
}

// Push the whole list to the cloud: add/update what's here, remove what's gone.
async function save(){
  const rows = tasks.map(t => ({ id: t.id, data: t }));
  if(rows.length){
    const { error } = await sb.from("tasks").upsert(rows);
    if(error){ alert("Couldn't save to the cloud: " + error.message); return; }
    await sb.from("tasks").delete().not("id","in","("+tasks.map(t=>t.id).join(",")+")");
  } else {
    await sb.from("tasks").delete().neq("id", 0);
  }
}
const get = id => tasks.find(t => t.id === id);

let openSet = new Set();                       // which task detail panels are open
function onToggle(id, open){ open ? openSet.add(id) : openSet.delete(id); }

function openComposer(){ document.getElementById("qadd").classList.add("open");
  document.getElementById("t-title").focus(); }
function closeComposer(){ document.getElementById("qadd").classList.remove("open"); resetNewSubs(); }

// Sub-tasks typed while creating a task live here until the task is saved.
let newSubs = [];
function addNewSub(){
  const t=document.getElementById("ns-text"), d=document.getElementById("ns-date");
  const v=t.value.trim(); if(!v) return;
  newSubs.push({text:v, done:false, due:d.value||""});
  t.value=""; d.value=""; renderNewSubs(); t.focus();
}
function delNewSub(i){ newSubs.splice(i,1); renderNewSubs(); }
function renderNewSubs(){
  document.getElementById("new-subs").innerHTML = newSubs.map((s,i)=>
    `<div class="sub"><span class="stxt">${s.text}</span>`+
    `${s.due?`<span class="sdate">${fmtShort(s.due)}</span>`:""}`+
    `<span class="x" onclick="delNewSub(${i})">✕</span></div>`).join("");
}
function resetNewSubs(){ newSubs=[]; document.getElementById("ns-text").value="";
  document.getElementById("ns-date").value=""; renderNewSubs(); }

// each tag gets a consistent colour from its name
const PALETTE = [
  ["#e0f2f6","#147a8e"],["#fde6e6","#b3413d"],["#fdf0d8","#a9741b"],
  ["#e2f4ea","#2e8257"],["#ece6fb","#6b4fb0"],["#fde6f1","#b03c75"],
  ["#e6eefb","#3b5ba9"],["#eaeff1","#4a5a63"]
];
function tagColor(n){ let h=0; for(const c of n) h+=c.charCodeAt(0); return PALETTE[h%PALETTE.length]; }

function addTask(){
  const title = document.getElementById("t-title").value.trim();
  if(!title){ alert("Give the task a title first."); return; }
  const cost = document.getElementById("t-cost").value;
  tasks.push({ id:Date.now(), title,
    due:document.getElementById("t-due").value,
    status:document.getElementById("t-status").value,
    cost: cost ? Number(cost) : null,
    cur:document.getElementById("t-cur").value,
    tags:document.getElementById("t-tags").value.split(",").map(s=>s.trim()).filter(Boolean),
    notes:document.getElementById("t-notes").value.trim(), subs:newSubs });
  newSubs=[];   // hand the list to the new task, then start fresh for the next one
  save();
  ["t-title","t-due","t-cost","t-tags","t-notes"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("t-status").value="Needed";
  closeComposer(); render();
}

function setStatus(id,v){ get(id).status=v; save(); render(); }
function setNotes(id,v){ get(id).notes=v; save(); }
function toggleDone(id){ const t=get(id); t.status = t.status==="Approved" ? "Needed" : "Approved"; save(); render(); }
function delTask(id){ if(confirm("Delete this task?")){ tasks=tasks.filter(t=>t.id!==id); save(); render(); } }
function addSub(id,el){
  const wrap=el.closest(".subadd"), dateEl=wrap.querySelector(".s-date");
  const v=el.value.trim(); if(!v)return;
  get(id).subs.push({text:v,done:false,due:dateEl.value||""});
  el.value=""; dateEl.value=""; save(); render();
}
function toggleSub(id,i){ const s=get(id).subs[i]; s.done=!s.done; save(); render(); }
function delSub(id,i){ get(id).subs.splice(i,1); save(); render(); }

function daysUntil(due){
  if(!due) return null;
  const d=new Date(due+"T00:00:00"), t=new Date(); t.setHours(0,0,0,0);
  return Math.round((d-t)/86400000);
}
function fmtShort(due){ return new Date(due+"T00:00:00").toLocaleDateString(undefined,{day:"numeric",month:"short"}); }
// builds a Google Calendar "create event" link — opens a prefilled all-day event on the due date
function gcalUrl(title,due,details){
  const start=due.replaceAll("-","");
  const d=new Date(due+"T00:00:00"); d.setDate(d.getDate()+1);
  const end=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
  const p=new URLSearchParams({action:"TEMPLATE",text:title,dates:`${start}/${end}`});
  if(details) p.set("details",details);
  return "https://calendar.google.com/calendar/render?"+p.toString();
}

function taskCard(t){
  const n=daysUntil(t.due);
  let dueCls="due", dueTxt="No due date";
  if(n!==null){
    dueTxt=new Date(t.due+"T00:00:00").toLocaleDateString(undefined,{weekday:"short",day:"numeric",month:"short"});
    if(t.status!=="Approved"){
      if(n<0){ dueCls="due over"; dueTxt+=` · ${-n}d overdue`; }
      else if(n===0){ dueCls="due soon"; dueTxt+=" · today"; }
      else if(n<=7){ dueCls="due soon"; dueTxt+=` · in ${n}d`; }
    }
  }
  const done = t.status==="Approved";
  const chips = t.tags.map(tg=>{const[bg,fg]=tagColor(tg);
    return `<span class="chip" style="background:${bg};color:${fg}">${tg}</span>`;}).join("");
  const cost = t.cost ? `<span class="cost">${t.cur}${t.cost.toLocaleString()}</span>` : "";

  const doneCount=t.subs.filter(s=>s.done).length;
  const subLabel=t.subs.length?` (${doneCount}/${t.subs.length})`:"";
  const subRows=t.subs.map((s,i)=>{
    const sn = s.due ? daysUntil(s.due) : null;
    const sdate = s.due ? `<span class="sdate ${(!s.done&&sn<0)?'over':''}">${fmtShort(s.due)}</span>` : "";
    const scal = s.due ? `<a class="cal" href="${gcalUrl(s.text,s.due,'Sub-task of: '+t.title)}" target="_blank">📅</a>` : "";
    return `<div class="sub">
      <input type="checkbox" ${s.done?"checked":""} onchange="toggleSub(${t.id},${i})">
      <span class="stxt ${s.done?'done':''}">${s.text}</span>
      ${sdate}${scal}
      <span class="x" onclick="delSub(${t.id},${i})">✕</span></div>`;
  }).join("");
  const hasMore = t.notes || t.subs.length;
  const more = `<details class="more" ${openSet.has(t.id)?"open":""} ontoggle="onToggle(${t.id}, this.open)">
      <summary>${hasMore?"Notes & sub-tasks":"+ Add notes / sub-tasks"}${subLabel}</summary>
      <textarea placeholder="Notes — links, names…" onchange="setNotes(${t.id}, this.value)" style="margin:7px 0">${t.notes||""}</textarea>
      ${subRows}
      <div class="subadd">
        <input class="s-text" placeholder="Add a sub-task" onkeydown="if(event.key==='Enter')addSub(${t.id},this)">
        <input class="s-date" type="date" title="Optional due date">
        <button onclick="addSub(${t.id}, this.parentElement.querySelector('.s-text'))">+</button>
      </div></details>`;

  return `<div class="card"><div class="task">
    <div class="check ${done?'on':''}" onclick="toggleDone(${t.id})">${done?'✓':''}</div>
    <div class="body">
      <div class="titlewrap">
        <span class="title ${done?'done':''}">${t.title}</span>${chips}
        <button class="del" onclick="delTask(${t.id})" style="margin-left:auto">✕</button>
      </div>
      <div class="${dueCls}">${dueTxt}${t.due?` &nbsp;·&nbsp; <a class="cal" href="${gcalUrl(t.title,t.due,t.notes)}" target="_blank">📅 Add to Calendar</a>`:""}</div>
      <div class="meta">
        <select class="status" onchange="setStatus(${t.id}, this.value)">
          ${["Needed","Submitted","Approved"].map(s=>`<option ${s===t.status?"selected":""}>${s}</option>`).join("")}
        </select>${cost}
      </div>
      ${more}
    </div></div></div>`;
}

function updateTagFilter(){
  const sel=document.getElementById("f-tag"), cur=sel.value;
  const all=[...new Set(tasks.flatMap(t=>t.tags))].sort();
  sel.innerHTML=`<option value="all">All tags</option>`+
    all.map(tg=>`<option ${tg===cur?"selected":""}>${tg}</option>`).join("");
}

function render(){
  updateTagFilter();
  const ft=document.getElementById("f-tag").value;
  const list = ft==="all" ? tasks : tasks.filter(t=>t.tags.includes(ft));

  // stats
  const overdue=tasks.filter(t=>{const n=daysUntil(t.due);return t.status!=="Approved"&&n!==null&&n<0;}).length;
  const week=tasks.filter(t=>{const n=daysUntil(t.due);return t.status!=="Approved"&&n!==null&&n>=0&&n<=7;}).length;
  const open=tasks.filter(t=>t.status!=="Approved").length;
  document.getElementById("stats").innerHTML=
    `<div><b>${overdue}</b><span>overdue</span></div><div><b>${week}</b><span>this week</span></div><div><b>${open}</b><span>open</span></div>`;

  // buckets
  const G={overdue:[],today:[],week:[],later:[],nodate:[],done:[]};
  list.forEach(t=>{
    if(t.status==="Approved"){ G.done.push(t); return; }
    const n=daysUntil(t.due);
    if(n===null) G.nodate.push(t);
    else if(n<0) G.overdue.push(t);
    else if(n===0) G.today.push(t);
    else if(n<=7) G.week.push(t);
    else G.later.push(t);
  });
  const byDue=(a,b)=>(a.due||"9999")>(b.due||"9999")?1:-1;
  Object.values(G).forEach(arr=>arr.sort(byDue));

  const sections=[
    ["overdue","Overdue","overdue"],["today","Today","today"],
    ["week","This week",""],["later","Later",""],["nodate","No date",""]
  ];
  let html="";
  sections.forEach(([k,label,cls])=>{
    if(!G[k].length) return;
    html+=`<div class="sect ${cls}"><h2>${label}</h2><span class="count">${G[k].length}</span></div>`;
    html+=G[k].map(taskCard).join("");
  });
  if(!html) html=`<div class="empty">No tasks yet — tap “Add a task” to start. 🌊</div>`;
  if(G.done.length){
    html+=`<details class="completed-wrap"><summary>Completed (${G.done.length})</summary>`+
          G.done.map(taskCard).join("")+`</details>`;
  }
  document.getElementById("list").innerHTML=html;
}

// ---------- Login / logout ----------
// Show the app, hide the login screen, then load data from the cloud.
async function showApp(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  await load();
}
// Show the login screen, hide the app.
function showLogin(){
  document.getElementById("app").style.display="none";
  document.getElementById("login").style.display="flex";
}
// Try to sign in with the email + password typed in.
async function signIn(){
  const email=document.getElementById("l-email").value.trim();
  const password=document.getElementById("l-pass").value;
  const errEl=document.getElementById("l-err"); errEl.textContent="";
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if(error){ errEl.textContent="That didn't work — check the email and password."; return; }
  document.getElementById("l-pass").value="";   // don't leave the password sitting in the box
  showApp();
}
// Sign out and go back to the login screen.
async function signOut(){ await sb.auth.signOut(); showLogin(); }

// On open: if we're already signed in, go straight to the app; otherwise ask to log in.
async function init(){
  const { data } = await sb.auth.getSession();
  if(data.session) showApp(); else showLogin();
}
init();
</script>
